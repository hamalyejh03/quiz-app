<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quiz Result</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="container">
    <h1>Quiz Result</h1>

    <p>
        Correct answers:
        <span th:text="${correctCount}">0</span>
        /
        <span th:text="${totalQuestions}">0</span>
    </p>

    <p>
        Score:
        <span th:text="${percentage}">0</span>%
    </p>

    <p>
        <a th:href="@{/}">Back to quiz list</a>
    </p>
</div>
</body>
</html>
