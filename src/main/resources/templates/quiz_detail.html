<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${quiz.title}">Quiz Detail</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="container">
    <h1 th:text="${quiz.title}">Quiz Title</h1>

    <div th:if="${#lists.isEmpty(quiz.questions)}">
        <p>No questions available for this quiz.</p>
    </div>

    <div th:if="${!#lists.isEmpty(quiz.questions)}">
        <form th:action="@{/submitQuiz}" method="post">
            <input type="hidden" name="quizId" th:value="${quiz.id}" />

            <ol>
                <li th:each="question : ${quiz.questions}">
                    <div class="question">
                        <h2 th:text="${question.questionText}">Question text</h2>

                        <ul>
                            <li th:each="answer : ${question.answers}">
                                <label>
                                    <input type="radio"
                                           th:name="${'question_' + question.id}"
                                           th:value="${answer.id}" />
                                    <span th:text="${answer.answerText}">Answer text</span>
                                </label>
                            </li>
                        </ul>
                    </div>
                </li>
            </ol>

            <button type="submit">Submit Quiz</button>
        </form>
    </div>

    <p>
        <a th:href="@{/}">Back to quiz list</a>
    </p>
</div>
</body>
</html>
