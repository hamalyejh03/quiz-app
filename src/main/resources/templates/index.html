<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Application</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="container">
    <div class="header fade-in-up">
        <div class="user-info">
            Bienvenue, <span sec:authentication="name">Utilisateur</span>!
        </div>
        <form th:action="@{/logout}" method="post" style="display: inline;">
            <button type="submit" class="btn logout-btn">Déconnexion</button>
        </form>
    </div>

    <div class="content-container fade-in-up">
        <h1>Choisissez votre quiz</h1>

        <div th:if="${#lists.isEmpty(quizzes)}" class="no-quizzes">
            <p>Aucun quiz disponible.</p>
        </div>

        <div th:if="${!#lists.isEmpty(quizzes)}" class="quiz-grid">
            <a th:each="quiz : ${quizzes}"
               th:href="@{/welcome(quizId=${quiz.id})}"
               th:text="${quiz.title}"
               class="quiz-link fade-in-up">Quiz Title</a>
        </div>
    </div>
</div>

</body>
</html>
